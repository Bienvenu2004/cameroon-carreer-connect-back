spring:
  application:
    name: retms-backend
    version: 0.0.1-SNAPSHOT
  datasource:
    url: ${DB_URL}
    username: postgres
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    url: ${DB_URL}
    user: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    baseline-on-migrate: true
    baseline-version: 1
    out-of-order: true
  jwt:
    accessTokenExpiration: 900000
    refreshTokenExpiration: 604800000
    maxRefreshAge: 86400000
    secret: ${JWT_SECRET}
  threads:
    virtual:
      enabled: true

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    protocol: smtp
    from: ${MAIL_FROM}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true

  output:
    ansi:
      enabled: always

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 200MB

springdoc:
  swagger-ui:
    path: /swagger-ui.html

server:
  port: ${SERVER_PORT}
  tomcat:
    max-swallow-size: -1
    max-http-form-post-size: 10MB
    max-parameter-count: 10000

logging:
  level:
    root: INFO
    org:
      springframework:
        web: INFO

app:
  storage:
    base-dir: ${STORAGE_BASE_DIR}
    base-url: ${PUBLIC_URL}
    logo-dir: ${LOGO_DIRECTORY}
  client-url: ${CLIENT_URL}
  logo-url: ${LOGO_URL}


