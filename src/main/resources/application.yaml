spring:
  application:
    name: retms-backend
    version: 0.0.1-SNAPSHOT
  datasource:
    url: ${DB_URL}
    username: postgres
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    url: ${DB_URL}
    user: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    baseline-on-migrate: true
    baseline-version: 1
    out-of-order: true
  jwt:
    accessTokenExpiration: 900000
    refreshTokenExpiration: 604800000
    maxRefreshAge: 86400000
    secret: ${JWT_SECRET}
  threads:
    virtual:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        generate_statistics: true
        jdbc:
          batch_size: 20
          order_inserts: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    protocol: smtp
    from: ${MAIL_FROM}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true

  output:
    ansi:
      enabled: always

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 200MB

springdoc:
  swagger-ui:
    path: /swagger-ui.html

server:
  port: ${SERVER_PORT}
  tomcat:
    max-swallow-size: -1
    max-http-form-post-size: 10MB
    max-parameter-count: 10000

logging:
  level:
    root: INFO
    org:
      springframework:
        web: INFO

app:
  storage:
    base-dir: ${STORAGE_BASE_DIR}
    base-url: ${PUBLIC_URL}
    logo-dir: ${LOGO_DIRECTORY}
  client-url: ${CLIENT_URL}
  logo-url: ${LOGO_URL}

  # ---------------------------------------------------------------------
  # AI configuration
  #
  # Powers the seeker-side recommendations + (later) the conversational
  # assistant. We talk to Google Gemini via the Generative Language REST
  # API using Java 21's built-in HttpClient — no extra dependency.
  #
  # If `api-key` is blank the AI features short-circuit gracefully and
  # the recommendations endpoint returns an empty list. That keeps local
  # dev usable without a key.
  # ---------------------------------------------------------------------
  ai:
    gemini:
      base-url: https://generativelanguage.googleapis.com
      api-key: ${GEMINI_API_KEY:}
      model: gemini-flash-latest
      temperature: 0.3
      max-tokens: 4096
      timeout-seconds: 60
    recommendations:
      candidate-pool-size: 50      # max jobs we send to the model per request
      return-size: 5               # max jobs the model returns to the user


